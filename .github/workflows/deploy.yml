name: Deploy to Self-Hosted Runner

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      server_port:
        description: 'Application port'
        required: false
        default: '3100'
      deployment_branch:
        description: 'Override deployment branch (optional)'
        required: false
        default: ''

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      APP_CONTAINER_NAME: acn-bootcamp-app
      APP_IMAGE_NAME: acn-bootcamp-app
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Set up Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: '3.9.6'

    - name: Extract deployment information
      id: deployment-info
      run: |
        BRANCH=${GITHUB_REF#refs/heads/}
        MANUAL_BRANCH="${{ github.event.inputs.deployment_branch }}"
        if [ -n "$MANUAL_BRANCH" ]; then
          BRANCH="$MANUAL_BRANCH"
        fi
        COMMIT=$(git rev-parse --short HEAD)
        TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
        PORT_INPUT="${{ github.event.inputs.server_port }}"
        if [ -z "$PORT_INPUT" ]; then
          PORT_INPUT="3100"
        fi
        
        echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        echo "commit=$COMMIT" >> $GITHUB_OUTPUT
        echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
        echo "server_port=$PORT_INPUT" >> $GITHUB_OUTPUT
        
        echo "Deployment Info:"
        echo "  Branch: $BRANCH"
        echo "  Commit: $COMMIT"
        echo "  Timestamp: $TIMESTAMP"
        echo "  Port: $PORT_INPUT"

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Resolve build artifact
      id: build-artifact
      run: |
        JAR_FILE=$(find target -maxdepth 1 -type f -name '*.jar' ! -name 'original-*.jar' | head -n 1)
        if [ -z "$JAR_FILE" ]; then
          echo "No packaged jar found in target/"
          ls -la target || true
          exit 1
        fi
        echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
        echo "Resolved jar: $JAR_FILE"

    - name: Check Docker availability
      run: docker version

    - name: Build application image
      env:
        JAR_FILE: ${{ steps.build-artifact.outputs.jar_file }}
        APP_IMAGE_TAG: ${{ env.APP_IMAGE_NAME }}:${{ steps.deployment-info.outputs.commit }}
      run: |
        docker build \
          --build-arg JAR_FILE=$JAR_FILE \
          -t $APP_IMAGE_TAG \
          -t $APP_IMAGE_NAME:latest \
          .

    - name: Stop existing application (if running)
      continue-on-error: true
      run: |
        docker rm -f $APP_CONTAINER_NAME || true
        sleep 2

    - name: Start application container
      env:
        SERVER_PORT: ${{ steps.deployment-info.outputs.server_port }}
        DEPLOYMENT_BRANCH: ${{ steps.deployment-info.outputs.branch }}
        DEPLOYMENT_COMMIT: ${{ steps.deployment-info.outputs.commit }}
        DEPLOYMENT_TIMESTAMP: ${{ steps.deployment-info.outputs.timestamp }}
        APP_IMAGE_TAG: ${{ env.APP_IMAGE_NAME }}:${{ steps.deployment-info.outputs.commit }}
      run: |
        docker run -d \
          --name $APP_CONTAINER_NAME \
          --restart unless-stopped \
          -p $SERVER_PORT:$SERVER_PORT \
          -e SERVER_PORT=$SERVER_PORT \
          -e DEPLOYMENT_BRANCH="$DEPLOYMENT_BRANCH" \
          -e DEPLOYMENT_COMMIT="$DEPLOYMENT_COMMIT" \
          -e DEPLOYMENT_TIMESTAMP="$DEPLOYMENT_TIMESTAMP" \
          $APP_IMAGE_TAG
        sleep 5
        echo "Application container started on port $SERVER_PORT"
        docker ps --filter "name=$APP_CONTAINER_NAME"

    - name: Verify deployment
      env:
        SERVER_PORT: ${{ steps.deployment-info.outputs.server_port }}
      run: |
        for i in {1..30}; do
          if ! docker ps --format '{{.Names}}' | grep -qx "$APP_CONTAINER_NAME"; then
            echo "Application container is not running"
            docker logs $APP_CONTAINER_NAME || true
            exit 1
          fi

          if docker logs $APP_CONTAINER_NAME 2>&1 | grep -q "Started Application in"; then
            echo "Application container is running and Spring Boot has started"
            docker ps --filter "name=$APP_CONTAINER_NAME"
            exit 0
          fi

          echo "Attempt $i: Waiting for Spring Boot startup confirmation..."
          sleep 2
        done

        echo "Application did not report successful startup in logs"
        docker logs $APP_CONTAINER_NAME || true
        exit 1

    - name: Display application logs
      if: always()
      run: docker logs --tail 50 $APP_CONTAINER_NAME || true
