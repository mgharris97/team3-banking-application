spring.application.name=acn-bootcamp-app

# Port configuration - uses SERVER_PORT environment variable or defaults to 3100
server.port=${SERVER_PORT:3100}

# Thymeleaf configuration
spring.thymeleaf.cache=false

# Deployment info - uses environment variables or defaults
app.deployment.branch=${DEPLOYMENT_BRANCH:unknown}
app.deployment.commit=${DEPLOYMENT_COMMIT:unknown}
app.deployment.timestamp=${DEPLOYMENT_TIMESTAMP:unknown}
